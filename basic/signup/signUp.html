<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="회원가입 폼 - HTML Form 종합실습">
  <meta name="author" content="SKALA">
  <title>회원가입</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="site-header">
    <span class="logo">SKALA</span>
    <nav>
      <a href="signUp.html" class="active">회원가입</a>
    </nav>
  </header>

  <div class="container">
    <h2>👤 회원가입</h2>
    <p>SKALA-FRONT 회원가입을 환영합니다.</p>
    <hr>

    <form action="signUpResult.html" method="get">

      <fieldset>
        <legend>계정 정보</legend>
        <p>
          <label for="userName">이름: </label>
          <input type="text" id="userName" name="userName" required placeholder="홍길동">
          <small>(필수)</small>
        </p>
        <p>
          <label for="userId">아이디: </label>
          <input type="text" id="userId" name="userId" required
                 pattern="[A-Za-z0-9]{4,12}" title="영문 또는 숫자 4~12자"
                 placeholder="4~12자 영문/숫자">
          <small>(필수)</small>
        </p>
        <p>
          <label for="userPw">비밀번호: </label>
          <input type="password" id="userPw" name="userPw" required
                 minlength="8" placeholder="8자 이상 입력">
          <small>(필수)</small>
        </p>
        <p>
          <label for="userEmail">이메일: </label>
          <input type="email" id="userEmail" name="userEmail" required
                 placeholder="example@skala.com">
          <small>(필수)</small>
        </p>
        <p>
          <label for="userTel">전화번호: </label>
          <input type="tel" id="userTel" name="userTel"
                 pattern="010-\d{4}-\d{4}" title="010-0000-0000 형식"
                 placeholder="010-0000-0000">
        </p>
      </fieldset>

      <br>

      <fieldset>
        <legend>개인 프로필 정보</legend>
        <p>
          <label for="userBirth">생년월일: </label>
          <input type="date" id="userBirth" name="userBirth">
        </p>
        <p>
          성별:
          <label><input type="radio" name="gender" value="남성" checked> 남성</label>
          <label><input type="radio" name="gender" value="여성"> 여성</label>
          <label><input type="radio" name="gender" value="선택안함"> 선택안함</label>
        </p>
        <p>
          관심 분야 (중복 선택 가능): <br>
          <label><input type="checkbox" name="interest" value="프론트엔드"> 웹 프론트엔드</label><br>
          <label><input type="checkbox" name="interest" value="백엔드"> 백엔드 &amp; 데이터베이스</label><br>
          <label><input type="checkbox" name="interest" value="디자인"> UI/UX 디자인</label><br>
          <label><input type="checkbox" name="interest" value="인프라"> 클라우드 &amp; 인프라</label>
        </p>
        <p>
          <label for="region">지역: </label>
          <select id="region" name="region">
            <option value="" disabled selected>-- 선택해 주세요 --</option>
            <option value="서울">서울</option>
            <option value="경기">경기</option>
            <option value="부산">부산</option>
            <option value="대구">대구</option>
            <option value="기타">기타</option>
          </select>
        </p>
      </fieldset>

      <br>

      <fieldset>
        <legend>자기소개</legend>
        <p>
          <label for="intro">나를 표현하는 한 줄 소개 또는 가입 인사:</label><br>
          <textarea id="intro" name="intro" rows="5" cols="50"
                    maxlength="200" placeholder="여기에 내용을 입력하세요 (최대 200자)"></textarea>
        </p>
      </fieldset>

      <br>

      <fieldset>
        <legend>약관 동의</legend>
        <p>
          <label><input type="checkbox" name="agree" value="동의" required> 이용약관 및 개인정보 처리방침에 동의합니다.</label>
          <small>(필수)</small>
        </p>
      </fieldset>

      <br>

      <input type="submit" class="btn btn-primary" value="동의하고 회원가입">
      <input type="reset" class="btn" value="다시 작성">
    </form>
  </div>
</body>
</html>
